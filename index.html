<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room</title>

<style>
body{
  margin:0;
  font-family: 'Georgia', serif;
  background: radial-gradient(circle at top,#102635,#000);
  color:white;
  overflow:hidden;
}

.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
  animation:fade 1s;
}

.show{display:flex;}

@keyframes fade{
  from{opacity:0; transform:scale(.95)}
  to{opacity:1}
}

h1,h2{
  text-shadow:0 0 20px rgba(255,215,0,0.3);
}

button,input{
  padding:12px;
  margin-top:12px;
  border-radius:10px;
}

img{
  max-width:85%;
  border-radius:20px;
}

/* COFRE */
#chest{
  font-size:120px;
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 10px gold)}
  to{filter:drop-shadow(0 0 60px gold)}
}

/* FLASH */
#flash{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
}

/* PARTICULAS */
.p{
  position:absolute;
  background:gold;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:explode 1s forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* FUEGOS */
.f{
  position:absolute;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:boom 1s forwards;
}

@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}

/* LLUVIA */
#rain span{
  position:absolute;
  top:-40px;
  font-size:30px;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(1000px);opacity:0}
}

</style>
</head>

<body>

<div id="flash"></div>

<div id="s0" class="screen show">
<h1>🌍 Escape Room</h1>
<p>Una aventura comienza…</p>
<button onclick="start()">Comenzar</button>
</div>

<div id="s1" class="screen">
<h2>Nueva York</h2>
<p>Rascacielos - Presidentes</p>
<input id="r1">
<button onclick="c1()">OK</button>
</div>

<div id="s2" class="screen">
<h2>El agua lo recuerda</h2>
<p>¿Cuántas almas se llevó?</p>
<input id="r2">
<button onclick="c2()">OK</button>
</div>

<div id="s3" class="screen">
<img src="padel.jpg">
<p>¿Partidos ganados?</p>
<input id="r3">
<button onclick="c3()">OK</button>
</div>

<div id="s4" class="screen">
<h2>Código final</h2>
<input id="code">
<button onclick="openChest()">Abrir</button>
</div>

<div id="s5" class="screen">
<div id="chest">🧰</div>
<p>Abriendo el tesoro…</p>
</div>

<div id="s6" class="screen">
<img src="couple.jpg">
<div id="rain"></div>
<h2>💶 EL TESORO ES VUESTRO 💶</h2>
</div>

<audio id="music" src="inicio.mp3" loop></audio>
<audio id="music2" src="final.mp3"></audio>
<audio id="open" src="cofre.mp3"></audio>

<script>

function go(n){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("show"))
 document.getElementById("s"+n).classList.add("show")
}

function start(){
 go(1)
 music.play()
}

function c1(){ if(r1.value==279) go(2) }
function c2(){ if(r2.value==127) go(3) }
function c3(){ if(r3.value==5) go(4) }

function openChest(){
 if(code.value==147){
   go(5)
   music.pause()
   music2.play()
   open.play()
   flash()
   explosion()

   setTimeout(()=>{
     go(6)
     rain()
   },2000)
 }
}

function flash(){
 let f=document.getElementById("flash")
 f.style.opacity=1
 setTimeout(()=>f.style.opacity=0,300)
}

function explosion(){
 for(let i=0;i<80;i++){
   let p=document.createElement("div")
   p.className="p"
   p.style.left="50%"
   p.style.top="50%"
   p.style.setProperty("--x",(Math.random()*600-300)+"px")
   p.style.setProperty("--y",(Math.random()*600-300)+"px")
   document.body.appendChild(p)
   setTimeout(()=>p.remove(),1000)
 }
 fireworks()
}

function fireworks(){
 for(let i=0;i<50;i++){
   let f=document.createElement("div")
   f.className="f"
   f.style.left="50%"
   f.style.top="50%"
   f.style.setProperty("--x",(Math.random()*800-400)+"px")
   f.style.setProperty("--y",(Math.random()*800-400)+"px")
   document.body.appendChild(f)
   setTimeout(()=>f.remove(),1000)
 }
}

function rain(){
 setInterval(()=>{
   let s=document.createElement("span")
   s.innerHTML="💶"
   s.style.left=Math.random()*100+"%"
   s.style.animationDuration=(1+Math.random()*2)+"s"
   document.getElementById("rain").appendChild(s)
   setTimeout(()=>s.remove(),3000)
 },200)
}

</script>

</body>
</html>
